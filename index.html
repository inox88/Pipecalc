<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shop Floor Offset Blueprint</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 15px;
            margin: 0;
            box-sizing: border-box;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; color: #00ffcc; margin-top: 0; margin-bottom: 15px; font-size: 16px; letter-spacing: 1px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #bbbbbb; font-size: 14px; }
        input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #2a2a2a;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        .row { display: flex; gap: 8px; }
        .row > div { flex: 1; }
        .toggle-btn {
            width: 100%;
            padding: 10px;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }
        .toggle-btn.active {
            background: #00ffcc;
            color: #121212;
            border-color: #00ffcc;
        }
        #canvas-container {
            width: 100%;
            height: 300px;
            background: #09090b;
            border-radius: 4px;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
            border: 1px solid #27272a;
        }
        canvas { width: 100%; height: 100%; display: block; }
        .view-bar {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            margin-bottom: 15px;
        }
        .view-btn {
            flex: 1;
            padding: 8px 2px;
            background: #222;
            color: #aaa;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }
        .view-btn.active {
            background: #2563eb;
            color: #fff;
            border-color: #3b82f6;
        }
        .output-box {
            margin-top: 15px;
            background: #252525;
            padding: 12px;
            border-left: 5px solid #00ffcc;
            border-radius: 4px;
        }
        .output-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 16px;
        }
        .output-line:last-child { margin-bottom: 0; }
        .val { font-weight: bold; color: #00ffcc; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>SHOP FLOOR BLUEPRINT VISUALIZER</h2>
    
    <!-- Calculation Mode Switcher -->
    <div class="view-bar" style="margin-bottom: 15px;">
        <button id="mode-std" class="view-btn active" onclick="setCalcMode('STD')" style="font-size: 13px; padding: 10px 0;">STANDARD RUN</button>
        <button id="mode-fixed" class="view-btn" onclick="setCalcMode('FIXED')" style="font-size: 13px; padding: 10px 0; border-left: none;">FIXED-POINT 3D</button>
    </div>
    
    <div class="input-group">
        <label id="rise-label">Rise / Fall (mm)</label>
        <div class="row">
            <div style="flex: 2;"><input type="number" id="rise" value="600" oninput="updateAll()"></div>
            <div><button id="btn-rise-up" class="toggle-btn active" onclick="setDir('rise', 'Up')">UP</button></div>
            <div><button id="btn-rise-down" class="toggle-btn" onclick="setDir('rise', 'Down')">DOWN</button></div>
        </div>
    </div>

    <div class="input-group">
        <label id="offset-label">Offset Side Shift In / Out (mm)</label>
        <div class="row">
            <div style="flex: 2;"><input type="number" id="offset" value="413" oninput="updateAll()"></div>
            <div><button id="btn-off-right" class="toggle-btn active" onclick="setDir('offset', 'Right')">RIGHT</button></div>
            <div><button id="btn-off-left" class="toggle-btn" onclick="setDir('offset', 'Left')">LEFT</button></div>
        </div>
    </div>

    <!-- Hidden field for Fixed-Point Constraint Calculations -->
    <div class="input-group" id="linear-group" style="display: none;">
        <label>Linear Distance / Forward Run (mm)</label>
        <input type="number" id="linearDist" value="435.5" oninput="updateAll()">
    </div>

    <!-- Fitting Selection Field (Used only in Standard Mode) -->
    <div class="input-group" id="angle-group">
        <label>Fitting Angle</label>
        <select id="angle" onchange="updateAll()">
            <option value="45" selected>45° Elbow</option>
            <option value="90">90° Elbow</option>
            <option value="30">30° Elbow</option>
            <option value="22.5">22.5° Elbow</option>
            <option value="11.25">11.25° Elbow</option>
        </select>
    </div>

    <div id="canvas-container">
        <canvas id="pipeCanvas"></canvas>
    </div>
    
    <div class="view-bar">
        <button id="view-iso" class="view-btn active" onclick="setView('ISO')">ISO</button>
        <button id="view-plan" class="view-btn" onclick="setView('PLAN')">PLAN</button>
        <button id="view-elev" class="view-btn" onclick="setView('ELEV')">ELEV</button>
        <button id="view-enda" class="view-btn" onclick="setView('ENDA')">END A</button>
        <button id="view-endb" class="view-btn" onclick="setView('ENDB')">END B</button>
    </div>

    <div class="output-box">
        <div class="output-line">
            <span>Cut Length (Travel C-C):</span>
            <span class="val" id="travelOut">-</span>
        </div>
        <div class="output-line">
            <span id="fittingLabel">Selected Elbow:</span>
            <span class="val" id="fittingOut">-</span>
        </div>
        <div class="output-line">
            <span>Roll Orientation Angle:</span>
            <span class="val" id="rollOut">-</span>
        </div>
    </div>
</div>

<script>
    let calcMode = 'STD'; 
    let riseDir = 'Up';
    let offsetDir = 'Right';
    let currentView = 'ISO';

    let rotX = -0.35; 
    let rotY = 0.55;

    const canvas = document.getElementById('pipeCanvas');
    const ctx = canvas.getContext('2d');

    window.addEventListener('resize', () => { resizeCanvas(); updateAll(); });
    window.addEventListener('DOMContentLoaded', () => { resizeCanvas(); updateAll(); });

    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width * window.devicePixelRatio;
        canvas.height = rect.height * window.devicePixelRatio;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }

    function setCalcMode(mode) {
        calcMode = mode;
        document.getElementById('mode-std').classList.toggle('active', mode === 'STD');
        document.getElementById('mode-fixed').classList.toggle('active', mode === 'FIXED');
        
        if (mode === 'FIXED') {
            document.getElementById('linear-group').style.display = 'block';
            document.getElementById('angle-group').style.display = 'none';
            document.getElementById('fittingLabel').innerText = "Calculated Elbow:";
        } else {
            document.getElementById('linear-group').style.display = 'none';
            document.getElementById('angle-group').style.display = 'block';
            document.getElementById('fittingLabel').innerText = "Selected Elbow:";
        }
        updateAll();
    }

    function setDir(type, value) {
        if (type === 'rise') {
            riseDir = value;
            document.getElementById('btn-rise-up').classList.toggle('active', value === 'Up');
            document.getElementById('btn-rise-down').classList.toggle('active', value === 'Down');
        } else {
            offsetDir = value;
            document.getElementById('btn-off-right').classList.toggle('active', value === 'Right');
            document.getElementById('btn-off-left').classList.toggle('active', value === 'Left');
        }
        updateAll();
    }

    function setView(viewName) {
        currentView = viewName;
        const views = ['iso', 'plan', 'elev', 'enda', 'endb'];
        views.forEach(v => document.getElementById(`view-${v}`).classList.toggle('active', v === viewName.toLowerCase()));
        
        if (viewName === 'ISO') { rotX = -0.35; rotY = 0.55; }
        else if (viewName === 'PLAN') { rotX = -Math.PI/2; rotY = 0; } 
        else if (viewName === 'ELEV') { rotX = 0; rotY = 0; }        
        else if (viewName === 'ENDA') { rotX = 0; rotY = Math.PI/2; } 
        else if (viewName === 'ENDB') { rotX = 0; rotY = -Math.PI/2; } 
        
        updateAll();
    }

    function updateAll() {
        const V = Math.abs(parseFloat(document.getElementById('rise').value)) || 0;
        const S = Math.abs(parseFloat(document.getElementById('offset').value)) || 0;
        
        let travel = 0;
        let rollDeg = 0;
        let elbowDeg = 0;
        let displayL = 0;

        if (calcMode === 'STD') {
            elbowDeg = parseFloat(document.getElementById('angle').value);
            const diagonalPlane = Math.sqrt(Math.pow(V, 2) + Math.pow(S, 2));
            const angleRad = elbowDeg * (Math.PI / 180);
            
            travel = diagonalPlane / Math.sin(angleRad);
            displayL = travel * Math.cos(angleRad); // Calculated forward depth
            
            if (V > 0) {
                rollDeg = Math.atan2(S, V) * (180 / Math.PI);
            } else {
                rollDeg = S > 0 ? 90 : 0;
            }
            document.getElementById('fittingOut').innerText = elbowDeg + "°";
        } else {
            const L = Math.abs(parseFloat(document.getElementById('linearDist').value)) || 0;
            displayL = L;
            
            travel = Math.sqrt(Math.pow(V, 2) + Math.pow(S, 2) + Math.pow(L, 2));
            
            if (travel > 0) {
                elbowDeg = Math.acos(V / travel) * (180 / Math.PI);
            } else {
                elbowDeg = 0;
            }
            
            rollDeg = Math.atan2(S, L) * (180 / Math.PI);
            document.getElementById('fittingOut').innerText = elbowDeg.toFixed(2) + "°";
        }

        document.getElementById('travelOut').innerText = travel.toFixed(1) + " mm";
        document.getElementById('rollOut').innerText = Math.abs(rollDeg).toFixed(2) + "°";
        
        drawPipeMockup(V, S, displayL);
    }

    function drawPipeMockup(v, s, l) {
        const w = canvas.width / window.devicePixelRatio;
        const h = canvas.height / window.devicePixelRatio;
        ctx.clearRect(0, 0, w, h);
        
        const yMult = (riseDir === 'Up') ? -1 : 1;
        const xMult = (offsetDir === 'Right') ? 1 : -1;
        
        const p1 = { x: 0, y: 0, z: 0 };
        const p2 = { x: 0, y: v * yMult, z: 0 }; 
        const p3 = { x: s * xMult, y: v * yMult, z: l }; 
        
        function project(pt) {
            let x1 = pt.x * Math.cos(rotY) - pt.z * Math.sin(rotY);
            let z1 = pt.x * Math.sin(rotY) + pt.z * Math.cos(rotY);
            let y2 = pt.y * Math.cos(rotX) - z1 * Math.sin(rotX);
            
            const maxDim = Math.max(v, s, l, 100);
            const scale = (Math.min(w, h) / maxDim) * 0.45;
            
            return {
                x: (w / 2) + x1 * scale,
                y: (h / 2) + y2 * scale
            };
        }
        
        const s1 = project(p1);
        const s2 = project(p2);
        const s3 = project(p3);
        
        // Render 3D Wireframe Boundary Boxes
        ctx.strokeStyle = "rgba(255, 255, 255, 0.07)";
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        
        const corners = [
            {x: 0, y: 0, z: l}, {x: s*xMult, y: 0, z: 0}, {x: s*xMult, y: 0, z: l},
            {x: 0, y: v*yMult, z: l}, {x: s*xMult, y: v*yMult, z: 0}
        ].map(project);
        
        ctx.beginPath();
        ctx.moveTo(s1.x, s1.y); ctx.lineTo(corners[1].x, corners[1].y);
        ctx.lineTo(corners[2].x, corners[2].y); ctx.lineTo(corners[0].x, corners[0].y);
        ctx.closePath(); ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(corners[1].x, corners[1].y); ctx.lineTo(corners[4].x, corners[4].y);
        ctx.moveTo(corners[0].x, corners[0].y); ctx.lineTo(corners[3].x, corners[3].y);
        ctx.stroke();
        
        // Render Centerline Segments
        ctx.setLineDash([]);
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        
        // Drop leg segment
        ctx.strokeStyle = "#00ffcc"; 
        ctx.beginPath();
        ctx.moveTo(s1.x, s1.y);
        ctx.lineTo(s2.x, s2.y);
        ctx.stroke();
        
        // Spool travel segment
        ctx.strokeStyle = "#2563eb"; 
        ctx.beginPath();
        ctx.moveTo(s2.x, s2.y);
        ctx.lineTo(s3.x, s3.y);
        ctx.stroke();
        
        // Nodes / Center Points
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.arc(s1.x, s1.y, 4, 0, 2*Math.PI); ctx.fill();
        ctx.beginPath(); ctx.arc(s2.x, s2.y, 4, 0, 2*Math.PI); ctx.fill();
        ctx.fillStyle = "#00ffcc";
        ctx.beginPath(); ctx.arc(s3.x, s3.y, 5, 0, 2*Math.PI); ctx.fill();
        
        ctx.fillStyle = "#888";
        ctx.font = "10px monospace";
        ctx.fillText("START (A)", s1.x + 8, s1.y - 4);
        ctx.fillText("ELBOW (B)", s2.x + 8, s2.y - 4);
        ctx.fillStyle = "#00ffcc";
        ctx.fillText("TARGET", s3.x + 8, s3.y - 4);
    }
</script>
</body>
</html>
