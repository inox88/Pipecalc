<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed-Point Tie-In Calculator</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 15px;
            margin: 0;
            box-sizing: border-box;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; color: #00ffcc; margin-top: 0; margin-bottom: 20px; font-size: 16px; letter-spacing: 1px; }
        .input-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #bbbbbb; font-size: 14px; }
        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #2a2a2a;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        .row { display: flex; gap: 8px; }
        .row > div { flex: 1; }
        .toggle-btn {
            width: 100%;
            padding: 12px;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }
        .toggle-btn.active {
            background: #00ffcc;
            color: #121212;
            border-color: #00ffcc;
        }
        .output-box {
            margin-top: 20px;
            background: #252525;
            padding: 15px;
            border-left: 5px solid #00ffcc;
            border-radius: 4px;
        }
        .output-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 16px;
        }
        .output-line:last-child { margin-bottom: 0; }
        .val { font-weight: bold; color: #00ffcc; font-size: 22px; }
        .note-box {
            margin-top: 15px;
            background: #2a2115;
            border: 1px solid #ff9900;
            padding: 10px;
            border-radius: 4px;
            color: #ffb366;
            font-size: 13px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>FIXED-POINT TIE-IN CALCULATOR</h2>
    
    <div class="input-group">
        <label>Rise / Fall (mm)</label>
        <div class="row">
            <div style="flex: 2;"><input type="number" id="rise" value="600" oninput="calculateTieIn()"></div>
            <div><button id="btn-rise-up" class="toggle-btn active" onclick="setDir('rise', 'Up')">UP</button></div>
            <div><button id="btn-rise-down" class="toggle-btn" onclick="setDir('rise', 'Down')">DOWN</button></div>
        </div>
    </div>

    <div class="input-group">
        <label>Side Offset In / Out (mm)</label>
        <div class="row">
            <div style="flex: 2;"><input type="number" id="offset" value="413" oninput="calculateTieIn()"></div>
            <div><button id="btn-off-right" class="toggle-btn active" onclick="setDir('offset', 'Right')">RIGHT</button></div>
            <div><button id="btn-off-left" class="toggle-btn" onclick="setDir('offset', 'Left')">LEFT</button></div>
        </div>
    </div>

    <div class="input-group">
        <label>Linear Distance / Forward Run (mm)</label>
        <input type="number" id="linearDist" value="435.5" oninput="calculateTieIn()">
    </div>

    <div class="input-group">
        <label>Fitting Degree to Use</label>
        <select id="angle" onchange="calculateTieIn()">
            <option value="45" selected>45° Elbow</option>
            <option value="90">90° Elbow</option>
            <option value="30">30° Elbow</option>
            <option value="22.5">22.5° Elbow</option>
            <option value="11.25">11.25° Elbow</option>
        </select>
    </div>

    <div class="output-box">
        <div class="output-line">
            <span>True Travel (Center-to-Center):</span>
            <span class="val" id="travelOut">-</span>
        </div>
        <div class="output-line">
            <span>Elbow Roll Orientation:</span>
            <span class="val" id="rollOut">-</span>
        </div>
    </div>

    <div class="note-box">
        ⚠️ REMEMBER: Deduct your fitting allowance / take-out from the center-to-center travel before cutting!
    </div>
</div>

<script>
    let riseDir = 'Up';
    let offsetDir = 'Right';

    window.addEventListener('DOMContentLoaded', () => {
        calculateTieIn();
    });

    function setDir(type, value) {
        if (type === 'rise') {
            riseDir = value;
            document.getElementById('btn-rise-up').classList.toggle('active', value === 'Up');
            document.getElementById('btn-rise-down').classList.toggle('active', value === 'Down');
        } else {
            offsetDir = value;
            document.getElementById('btn-off-right').classList.toggle('active', value === 'Right');
            document.getElementById('btn-off-left').classList.toggle('active', value === 'Left');
        }
        calculateTieIn();
    }

    function calculateTieIn() {
        const V = Math.abs(parseFloat(document.getElementById('rise').value)) || 0;
        const S = Math.abs(parseFloat(document.getElementById('offset').value)) || 0;
        const L = Math.abs(parseFloat(document.getElementById('linearDist').value)) || 0;
        const elbowDeg = parseFloat(document.getElementById('angle').value);

        // 1. Calculate the actual 3D straight-line distance space between fixed points
        const diagonalSpace = Math.sqrt(Math.pow(V, 2) + Math.pow(S, 2) + Math.pow(L, 2));

        // 2. Calculate Travel along the specific chosen elbow path 
        // For a chosen elbow angle, Travel C-C = True Diagonal Space / sin(elbow)
        const angleRad = elbowDeg * (Math.PI / 180);
        let travel = diagonalSpace / (Math.sin(angleRad) || 1);

        // 3. Calculate compound roll orientation angle relative to the run plane
        // Using atan2 across the horizontal and vertical planes handles shifts cleanly
        let rollDeg = 0;
        if (L > 0 || S > 0) {
            rollDeg = Math.atan2(S, L) * (180 / Math.PI);
        }

        // Output figures cleanly to UI panels
        document.getElementById('travelOut').innerText = travel.toFixed(1) + " mm";
        document.getElementById('rollOut').innerText = Math.abs(rollDeg).toFixed(2) + "°";
    }
</script>
</body>
</html>
